name: 'Kubectl tool installer'
description: 'Install a specific version of kubectl binary. Acceptable values are latest or any semantic version string like "v1.15.0"'
inputs:
   version:
      description: 'Version of kubectl'
      required: true
      default: 'latest'
   downloadBaseURL:
      description: 'Base URL to download kubectl from (https only). Use for private mirrors.'
      required: false
      default: 'https://dl.k8s.io'
   checksum:
      description: 'Expected SHA256 of the kubectl binary. Recommended when overriding downloadBaseURL.'
      required: false
      default: ''
outputs:
   kubectl-path:
      description: 'Path to the cached kubectl binary'
branding:
   color: 'blue'
runs:
   using: 'node24'
   main: 'lib/index.js'
